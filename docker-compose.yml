services:
  api:
    build: .
    command: uvicorn src.api.routes:app --host 0.0.0.0 --port 8000
    # Nota: Em drives virtuais (G Drive), o espelhamento pode falhar. 
    # Use 'docker-compose up --build' se as mudanças não refletirem.
    volumes:
      - .:/app
    environment:
      - APP_API_KEY=${APP_API_KEY}
      - DATABASE_URL=sqlite:////app/fraud_logs.sqlite
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run app/dashboard.py
    depends_on:
      - api
    volumes:
      - .:/app
    environment:
      - API_URL=http://api:8000/v1
      - APP_API_KEY=${APP_API_KEY}
    ports:
      - "8501:8501"
